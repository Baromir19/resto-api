# On dit ‡ Spring de ne pas chercher MySQL, mais d'utiliser H2 en mÈmoire
spring.datasource.url=jdbc:h2:mem:pizzeriatestdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

spring.datasource.username=sa
spring.datasource.password=

# Hibernate va crÈer les tables automatiquement ‡ chaque lancement de test
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
